<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JS Operators Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Guia de Operadores JavaScript</h1>
            <p>Aprenda a lógica técnica através da prática</p>
        </header>

        <!-- Seção de Teoria (Informações) -->
        <section class="info-section">
            <div class="card-info">
                <h3>Aritméticos</h3>
                <p>+, -, *, /, % (Resto), ** (Potência)</p>
            </div>
            <div class="card-info">
                <h3>Comparação</h3>
                <p>== (Igual), === (Idêntico), !=, >, <</p>
            </div>
            <div class="card-info">
                <h3>Lógicos</h3>
                <p>&& (E), || (OU), ! (NÃO)</p>
            </div>
        </section>

        <!-- Seção de Teste (Entradas e Processamento) -->
        <main class="lab-section">
            <div class="input-group">
                <label>Valor A</label>
                <input type="number" id="valorA" placeholder="0">
            </div>

            <div class="input-group">
                <label>Operador</label>
                <select id="op">
                    <option value="+">Adição (+)</option>
                    <option value="-">Subtração (-)</option>
                    <option value="*">Multiplicação (*)</option>
                    <option value="/">Divisão (/)</option>
                    <option value="%">Resto da Divisão (%)</option>
                    <option value="**">Potência (**)</option>
                    <option value="===">Igualdade Estrita (===)</option>
                    <option value=">">Maior que (>)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Valor B</label>
                <input type="number" id="valorB" placeholder="0">
            </div>

            <button onclick="executarLogica()">Conferir Resultado</button>
        </main>

        <!-- Seção de Resposta (Saída) -->
        <footer id="resultado-container" class="hidden">
            <div class="display">
                <span id="label-res">RESULTADO:</span>
                <span id="valor-res">0</span>
            </div>
            <div id="explicacao-tecnica"></div>
        </footer>
    </div>
    <script src="operadores.js"></script>
</body>
</html>
